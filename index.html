<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Northumbria Department Workflow Map</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f0f0;
      color: #333;
      min-height: 100vh;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #161616; color: #e0e0e0; }
    }

    /* ── Top bar ── */
    .topbar {
      background: #1f4e78;
      color: white;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar h1 { font-size: 17px; font-weight: 600; }
    .topbar-filters { display: flex; gap: 8px; align-items: center; }
    .topbar-filters span { font-size: 12px; opacity: 0.7; }

    .filter-btn {
      padding: 4px 12px;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 20px;
      background: transparent;
      color: white;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.15s;
    }
    .filter-btn:hover { background: rgba(255,255,255,0.15); }
    .filter-btn.active { background: white; color: #1f4e78; border-color: white; }

    .btn-populate {
      padding: 4px 12px;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 4px;
      background: rgba(255,255,255,0.1);
      color: white;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.15s;
      margin-left: auto;
    }
    .btn-populate:hover { background: rgba(255,255,255,0.2); }
    .btn-populate:disabled { opacity: 0.4; cursor: not-allowed; }

    .statusbar {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
    }

    /* ── Main layout ── */
    .main {
      display: flex;
      height: calc(100vh - 50px);
      overflow: hidden;
    }

    /* ── Diagram scroll area ── */
    .diagram-scroll {
      flex: 1;
      overflow: auto;
      padding: 32px 28px 60px;
    }

    .diagram-columns {
      display: flex;
      gap: 0;
      align-items: flex-start;
      min-width: fit-content;
    }

    /* ── Workflow column ── */
    .wf-col {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      min-width: 300px;
      padding: 0 24px;
      border-right: 1px solid #ddd;
    }
    .wf-col:last-child { border-right: none; }
    @media (prefers-color-scheme: dark) { .wf-col { border-right-color: #2e2e2e; } }

    .wf-col-header {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #1f4e78;
      margin-bottom: 24px;
      padding-bottom: 8px;
      border-bottom: 2px solid #1f4e78;
      width: 100%;
    }
    @media (prefers-color-scheme: dark) {
      .wf-col-header { color: #5b9bd5; border-bottom-color: #5b9bd5; }
    }

    /* ── Node tree ── */
    .node-tree {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .node-row {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
    }

    .node-main-path {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    /* ── Step box ── */
    .step-wrap {
      position: relative;
      display: inline-flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .step-box {
      width: 190px;
      min-height: 64px;
      border: 1.5px solid #d0d0d0;
      border-radius: 8px;
      background: white;
      padding: 10px 12px 26px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      position: relative;
    }
    @media (prefers-color-scheme: dark) {
      .step-box { background: #242424; border-color: #424242; }
    }
    .step-box:hover {
      border-color: #1f4e78;
      box-shadow: 0 2px 10px rgba(31,78,120,0.12);
    }
    .step-box.has-detail { border-color: #5b9bd5; }
    .step-box.selected {
      border-color: #1f4e78;
      box-shadow: 0 0 0 3px rgba(31,78,120,0.18);
    }
    @media (prefers-color-scheme: dark) {
      .step-box.selected { border-color: #5b9bd5; box-shadow: 0 0 0 3px rgba(91,155,213,0.25); }
    }

    .step-tag {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #bbb;
      margin-bottom: 5px;
    }
    .step-task-text {
      font-size: 13px;
      font-weight: 500;
      color: #1a1a1a;
      line-height: 1.45;
    }
    @media (prefers-color-scheme: dark) { .step-task-text { color: #e0e0e0; } }

    /* Inline textarea for new step */
    .step-inline-input {
      width: 190px;
      min-height: 64px;
      border: 2px solid #1f4e78;
      border-radius: 8px;
      background: white;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: #1a1a1a;
      resize: none;
      outline: none;
      line-height: 1.45;
      box-shadow: 0 0 0 3px rgba(31,78,120,0.15);
    }
    @media (prefers-color-scheme: dark) {
      .step-inline-input { background: #242424; color: #e0e0e0; border-color: #5b9bd5; }
    }

    /* ── + handles ── */
    .step-handles {
      position: absolute;
      bottom: 4px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      padding: 0 8px;
      opacity: 0;
      transition: opacity 0.15s;
      pointer-events: none;
    }
    .step-wrap:hover .step-handles { opacity: 1; pointer-events: all; }

    .handle {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #1f4e78;
      color: white;
      font-size: 16px;
      font-weight: 300;
      cursor: pointer;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      padding-bottom: 1px;
      transition: transform 0.1s, background 0.1s;
      flex-shrink: 0;
    }
    .handle:hover { background: #163a5a; transform: scale(1.2); }
    .handle-ghost { width: 20px; height: 20px; flex-shrink: 0; }
    @media (prefers-color-scheme: dark) {
      .handle { background: #5b9bd5; }
      .handle:hover { background: #4a8ac4; }
    }

    /* ── Connectors ── */
    .conn-down {
      width: 2px;
      height: 28px;
      background: #ccc;
      margin-left: 94px;
      position: relative;
      flex-shrink: 0;
    }
    .conn-down::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: -4px;
      border-left: 5px solid transparent;
      border-right: 5px solid transparent;
      border-top: 7px solid #ccc;
    }
    @media (prefers-color-scheme: dark) {
      .conn-down { background: #4a4a4a; }
      .conn-down::after { border-top-color: #4a4a4a; }
    }

    .conn-horiz {
      display: flex;
      align-items: center;
      margin-top: 32px;
      margin-left: 4px;
      flex-shrink: 0;
    }
    .conn-horiz-line {
      width: 20px;
      height: 2px;
      background: #ccc;
      position: relative;
    }
    .conn-horiz-line::after {
      content: '';
      position: absolute;
      right: -1px;
      top: -4px;
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
      border-left: 7px solid #ccc;
    }
    @media (prefers-color-scheme: dark) {
      .conn-horiz-line { background: #4a4a4a; }
      .conn-horiz-line::after { border-left-color: #4a4a4a; }
    }
    .conn-horiz-label {
      font-size: 10px;
      color: #bbb;
      margin-left: 5px;
      white-space: nowrap;
    }

    .branch-yes-label {
      font-size: 10px;
      color: #bbb;
      margin: 2px 0 0 6px;
    }

    /* Rejoin chip */
    .rejoin-chip {
      font-size: 10px;
      color: #999;
      border: 1px dashed #ccc;
      border-radius: 4px;
      padding: 4px 10px;
      width: 190px;
      text-align: center;
      cursor: pointer;
      background: transparent;
      transition: border-color 0.15s, color 0.15s;
    }
    .rejoin-chip:hover { border-color: #1f4e78; color: #1f4e78; background: transparent; }

    /* Add-first placeholder */
    .add-first {
      width: 190px;
      height: 52px;
      border: 2px dashed #d0d0d0;
      border-radius: 8px;
      background: transparent;
      color: #ccc;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, color 0.15s;
    }
    .add-first:hover { border-color: #1f4e78; color: #1f4e78; background: transparent; }

    /* ── Side panel (step detail, slides in) ── */
    .side-panel {
      width: 0;
      overflow: hidden;
      transition: width 0.2s ease;
      background: white;
      border-left: 1px solid #ddd;
      flex-shrink: 0;
    }
    .side-panel.open { width: 270px; }
    @media (prefers-color-scheme: dark) {
      .side-panel { background: #1e1e1e; border-left-color: #333; }
    }

    .side-inner {
      width: 270px;
      padding: 20px;
      overflow-y: auto;
      height: 100%;
    }

    .side-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    @media (prefers-color-scheme: dark) { .side-title { border-bottom-color: #333; } }

    .side-close {
      background: none;
      border: none;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      color: #aaa;
      padding: 0 2px;
    }
    .side-close:hover { color: #333; background: none; }
    @media (prefers-color-scheme: dark) { .side-close:hover { color: #ddd; } }

    .sf { margin-bottom: 13px; }
    .sf label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #bbb;
      margin-bottom: 3px;
    }
    .sf input, .sf textarea {
      width: 100%;
      padding: 6px 9px;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      font-family: inherit;
      font-size: 13px;
      background: white;
      color: #222;
      transition: border-color 0.15s;
    }
    .sf input:focus, .sf textarea:focus { border-color: #1f4e78; outline: none; }
    @media (prefers-color-scheme: dark) {
      .sf input, .sf textarea { background: #2a2a2a; color: #ddd; border-color: #3a3a3a; }
    }
    .sf textarea { resize: vertical; min-height: 54px; }
    .sf-task textarea { font-size: 14px; font-weight: 500; min-height: 72px; }

    .side-hint {
      font-size: 11px;
      color: #bbb;
      line-height: 1.5;
      margin-top: 6px;
    }

    .side-btns {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid #eee;
    }
    @media (prefers-color-scheme: dark) { .side-btns { border-top-color: #333; } }

    .btn-save {
      flex: 1;
      padding: 8px;
      background: #1f4e78;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-save:hover { background: #163a5a; }

    .btn-del {
      padding: 8px 12px;
      background: transparent;
      color: #c0392b;
      border: 1px solid #e74c3c;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-del:hover { background: #fff0f0; }
    @media (prefers-color-scheme: dark) {
      .btn-del { color: #e57373; border-color: #c0392b; }
      .btn-del:hover { background: #2a1a1a; }
    }

    /* ── Links panel (always visible) ── */
    .links-panel {
      width: 220px;
      flex-shrink: 0;
      background: white;
      border-left: 1px solid #ddd;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    @media (prefers-color-scheme: dark) {
      .links-panel { background: #1e1e1e; border-left-color: #333; }
    }
    .links-section {
      padding: 20px 16px;
      overflow-y: auto;
      flex: 1;
    }

    .links-header {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #bbb;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .links-add-btn {
      font-size: 11px;
      padding: 2px 8px;
      border: 1px solid #ddd;
      border-radius: 3px;
      background: transparent;
      color: #888;
      cursor: pointer;
    }
    .links-add-btn:hover { border-color: #1f4e78; color: #1f4e78; background: transparent; }

    .link-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 0;
      border-bottom: 1px solid #f5f5f5;
    }
    .link-item:last-child { border-bottom: none; }
    @media (prefers-color-scheme: dark) { .link-item { border-bottom-color: #2a2a2a; } }

    .link-item a {
      font-size: 12px;
      color: #1f4e78;
      text-decoration: none;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .link-item a:hover { text-decoration: underline; }
    @media (prefers-color-scheme: dark) { .link-item a { color: #5b9bd5; } }

    .link-edit-btn {
      font-size: 10px;
      padding: 1px 6px;
      border: 1px solid #e0e0e0;
      border-radius: 3px;
      background: transparent;
      color: #bbb;
      cursor: pointer;
      flex-shrink: 0;
    }
    .link-edit-btn:hover { border-color: #1f4e78; color: #1f4e78; background: transparent; }

    .links-empty { font-size: 12px; color: #ccc; }

    .link-form {
      display: none;
      flex-direction: column;
      gap: 6px;
      margin-top: 8px;
    }
    .link-form.visible { display: flex; }
    .link-form input {
      width: 100%;
      padding: 5px 8px;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      font-size: 12px;
      font-family: inherit;
      background: white;
      color: #222;
    }
    @media (prefers-color-scheme: dark) {
      .link-form input { background: #2a2a2a; color: #ddd; border-color: #3a3a3a; }
    }
    .link-form-btns { display: flex; gap: 6px; }
    .link-form-btns button {
      flex: 1;
      padding: 5px;
      font-size: 12px;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid #ddd;
      background: white;
      color: #555;
    }
    .link-form-btns button.lf-save { background: #1f4e78; color: white; border-color: #1f4e78; }
    .link-form-btns button.lf-save:hover { background: #163a5a; }
    .link-form-btns button.lf-del { border-color: #e74c3c; color: #c0392b; }
    .link-form-btns button.lf-del:hover { background: #fff0f0; }
    @media (prefers-color-scheme: dark) {
      .link-form-btns button { background: #2a2a2a; color: #ccc; border-color: #3a3a3a; }
    }

    /* loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      color: #bbb;
      font-size: 14px;
      width: 100%;
    }
  </style>
</head>
<body>

<div class="topbar">
  <h1>Northumbria Department Workflow Map</h1>
  <div class="topbar-filters">
    <span>Filter:</span>
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="Teaching">Teaching</button>
    <button class="filter-btn" data-filter="Research">Research</button>
    <button class="filter-btn" data-filter="Admin">Admin</button>
  </div>
  <span class="statusbar" id="statusBar"></span>
  <button class="btn-populate" id="populateBtn">+ Populate Default Data</button>
</div>

<div class="main">

  <div class="diagram-scroll">
    <div class="diagram-columns" id="diagramColumns">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <div class="side-panel" id="sidePanel">
    <div class="side-inner" id="sideInner"></div>
  </div>

  <div class="links-panel">
    <div class="links-section">
      <div class="links-header">
        <span>Useful Links</span>
        <button class="links-add-btn" onclick="window.showLinkForm(null)">+ Add</button>
      </div>
      <div id="linksList"><span class="links-empty">No links yet</span></div>
      <div class="link-form" id="linkForm">
        <input type="text" id="linkNameIn" placeholder="Name (e.g. Timetabling)">
        <input type="text" id="linkUrlIn"  placeholder="https://...">
        <div class="link-form-btns">
          <button id="linkDelBtn" class="lf-del" style="display:none;" onclick="window.deleteLink()">Delete</button>
          <button onclick="window.hideLinkForm()">Cancel</button>
          <button class="lf-save" onclick="window.saveLink()">Save</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
import { getFirestore, collection, getDocs, updateDoc, deleteDoc, doc, addDoc, writeBatch, setDoc } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyDSK-2hI6ML1eykIed6E8S5Ve29phrEolI",
  authDomain: "nu-school-of-sport.firebaseapp.com",
  projectId: "nu-school-of-sport",
  storageBucket: "nu-school-of-sport.firebasestorage.app",
  messagingSenderId: "396866213410",
  appId: "1:396866213410:web:bc7f31d1eb1833306d1c7b"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── State ──────────────────────────────────────
let allDocs  = {};
let roots    = {};
let allLinks = {};
let currentFilter  = 'all';
let selectedId     = null;
let populateUsed   = false;
let editingLinkId  = null;
const WORKFLOWS    = ['Teaching', 'Research', 'Admin'];

// ── Default data ───────────────────────────────
function buildDefaultData() {
  const t1='teaching-1', tNo='teaching-1-no', t2='teaching-2', t3='teaching-3', t4='teaching-4';
  const r1='research-1', rNo='research-1-no', r2='research-2', r3='research-3';
  const a1='admin-1';
  const D = (w,s,t,nY,nN,rid,dec,rest={}) => ({
    workflow:w, step:s, task:t, nextYes:nY, nextNo:nN, rejoinId:rid||'',
    isDecision:!!dec, url:'', audience:'', documents:'', deadline:'', notes:'', ...rest
  });
  const docs = {
    [t1]:  D('Teaching','1', 'Do you have a PEP ready?',       t3,  tNo, '',  true),
    [tNo]: D('Teaching','1a','Get blank PEP template',          t2,  null,t3,  false, {notes:'Only if no PEP exists', documents:'PEP template'}),
    [t2]:  D('Teaching','1b','Complete the PEP',                t3,  null,'',  false, {notes:'Fill in all sections',  documents:'PEP'}),
    [t3]:  D('Teaching','2', 'Upload PEP to MS Teams',          t4,  null,'',  false, {notes:'Shared Teams channel',  documents:'PEP',      deadline:'Week 1'}),
    [t4]:  D('Teaching','3', 'Record link in SEM spreadsheet',  null,null,'',  false, {notes:'Add Teams link to tracker', documents:'SEM spreadsheet', deadline:'Week 1'}),
    [r1]:  D('Research','1', 'Do you have a PO form?',          r3,  rNo, '',  true),
    [rNo]: D('Research','1a','Get blank PO form',                r2,  null,r3,  false, {notes:'Only if no PO exists', documents:'PO form'}),
    [r2]:  D('Research','1b','Complete the PO form',             r3,  null,'',  false, {notes:'Fill in all fields',   documents:'PO form'}),
    [r3]:  D('Research','2', 'Upload PO & @ Liam for approval', null,null,'',  false, {notes:'Tag in Teams for sign-off', documents:'PO form'}),
    [a1]:  D('Admin',   '1', 'Admin step 1 (to be defined)',    null,null,'',  false, {notes:'Click to edit'}),
  };
  return { docs, rootIds:{ Teaching:t1, Research:r1, Admin:a1 } };
}

// ── Load ───────────────────────────────────────
function setStatus(m) { document.getElementById('statusBar').textContent = m; }

async function loadAll() {
  try {
    setStatus('Loading...');
    const [ws, ms, ls] = await Promise.all([
      getDocs(collection(db,'workflows')),
      getDocs(collection(db,'meta')),
      getDocs(collection(db,'links')),
    ]);
    allDocs={};  ws.forEach(d=>{ allDocs[d.id]=d.data(); });
    roots={};    ms.forEach(d=>{ if(d.data().rootId) roots[d.id]=d.data().rootId; });
    allLinks={}; ls.forEach(d=>{ allLinks[d.id]=d.data(); });
    setStatus(`${ws.size} step${ws.size!==1?'s':''} · ${new Date().toLocaleTimeString()}`);
    renderAll();
    renderLinks();
  } catch(e) {
    console.error(e);
    setStatus('Error: '+e.message);
    document.getElementById('diagramColumns').innerHTML='<div class="loading">Error loading — check console</div>';
  }
}

// ── Render ─────────────────────────────────────
function renderAll() {
  const el = document.getElementById('diagramColumns');
  if (!Object.keys(allDocs).length) {
    el.innerHTML='<div class="loading">No workflows yet — click "+ Populate Default Data"</div>';
    return;
  }
  const show = currentFilter==='all' ? WORKFLOWS : [currentFilter];
  el.innerHTML = show.map(wf => renderCol(wf)).join('');
}

function renderCol(wf) {
  const rootId = roots[wf];
  const body = (rootId && allDocs[rootId])
    ? renderTree(rootId, new Set())
    : `<button class="add-first" onclick="window.startInline('${wf}',null,true)" title="Add first step">+</button>`;
  return `<div class="wf-col" id="col-${wf}">
    <div class="wf-col-header">${wf}</div>
    <div class="node-tree" id="tree-${wf}">${body}</div>
  </div>`;
}

function renderTree(id, visited) {
  if (!id || !allDocs[id] || visited.has(id)) return '';
  visited.add(id);
  const n = allDocs[id];
  const hasBranch = n.nextNo && allDocs[n.nextNo];
  let html = '';

  if (hasBranch) {
    const bv = new Set(visited);
    const branchHtml = renderBranchChain(n.nextNo, bv, n.rejoinId);
    html += `<div class="node-row">
      <div class="node-main-path">
        ${renderBox(id, n)}
        <span class="branch-yes-label">↓ Yes</span>
      </div>
      <div class="conn-horiz">
        <div class="conn-horiz-line"></div>
        <span class="conn-horiz-label">No →</span>
      </div>
      <div style="margin-left:8px;margin-top:0;display:flex;flex-direction:column;align-items:flex-start;">
        ${branchHtml}
      </div>
    </div>`;
    if (n.nextYes && !visited.has(n.nextYes)) {
      html += `<div class="conn-down"></div>${renderTree(n.nextYes, visited)}`;
    } else {
      html += renderPlusStub(id, n.workflow, true);
    }
  } else {
    html += renderBox(id, n);
    if (n.nextYes && !visited.has(n.nextYes)) {
      html += `<div class="conn-down"></div>${renderTree(n.nextYes, visited)}`;
    } else {
      html += renderPlusStub(id, n.workflow, true);
    }
  }
  return html;
}

function renderBranchChain(id, visited, rejoinId) {
  let html = '';
  let cur = id;
  while (cur && allDocs[cur] && !visited.has(cur) && cur !== rejoinId) {
    visited.add(cur);
    const n = allDocs[cur];
    html += renderBox(cur, n);
    const nextOk = n.nextYes && !visited.has(n.nextYes) && n.nextYes !== rejoinId;
    if (nextOk) {
      html += `<div class="conn-down"></div>`;
      cur = n.nextYes;
    } else {
      if (rejoinId && allDocs[rejoinId]) {
        html += `<div class="conn-down" style="height:16px;"></div>
          <button class="rejoin-chip" onclick="window.selectStep('${rejoinId}')">
            ↳ rejoins step ${allDocs[rejoinId].step||'?'}
          </button>`;
      } else {
        html += renderPlusStub(cur, n.workflow, true);
      }
      break;
    }
  }
  return html;
}

function renderBox(id, n) {
  const sel  = id===selectedId ? ' selected' : '';
  const det  = (n.url||n.audience||n.documents||n.deadline||n.notes) ? ' has-detail' : '';
  const tag  = n.step ? `Step ${esc(n.step)}` : 'Step';

  // Only show a handle if that slot is free
  const canDown   = !n.nextYes;
  const canBranch = !n.nextNo;

  const hLeft  = canBranch
    ? `<button class="handle" title="Branch left"   onclick="event.stopPropagation();window.startInline('${n.workflow}','${id}',false)">+</button>`
    : `<span class="handle handle-ghost"></span>`;
  const hDown  = canDown
    ? `<button class="handle" title="Next step down" onclick="event.stopPropagation();window.startInline('${n.workflow}','${id}',true)">+</button>`
    : `<span class="handle handle-ghost"></span>`;
  const hRight = canBranch
    ? `<button class="handle" title="Branch right"  onclick="event.stopPropagation();window.startInline('${n.workflow}','${id}',false)">+</button>`
    : `<span class="handle handle-ghost"></span>`;

  // If all slots filled, don't render handles at all
  const handles = (canDown || canBranch)
    ? `<div class="step-handles">${hLeft}${hDown}${hRight}</div>`
    : '';

  return `<div class="step-wrap" id="wrap-${id}">
    <div class="step-box${sel}${det}" onclick="window.selectStep('${id}')">
      <div class="step-tag">${tag}</div>
      <div class="step-task-text">${esc(n.task||'(empty)')}</div>
    </div>
    ${handles}
  </div>`;
}

function renderPlusStub(parentId, wf, isYes) {
  const dir = isYes ? 'true' : 'false';
  return `<div class="conn-down" style="height:14px;"></div>
    <button class="add-first" onclick="window.startInline('${wf}','${parentId}',${dir})" title="Add step">+</button>`;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Inline input ───────────────────────────────
// isYes=true → nextYes chain, isYes=false → nextNo branch
// dir: 'left'|'right' used only for labelling, both map to nextNo

window.startInline = function(wf, parentId, isYes) {
  // Slot must be free - handles are hidden if already filled, but guard anyway
  if (parentId && allDocs[parentId]) {
    const field = isYes ? 'nextYes' : 'nextNo';
    if (allDocs[parentId][field]) return; // slot already taken, do nothing
  }

  // Inject a temporary pending entry
  const tempId = '__pending__';
  allDocs[tempId] = { workflow:wf, step:'', task:'', url:'', audience:'', documents:'',
    deadline:'', notes:'', isDecision:false, nextYes:null, nextNo:null, rejoinId:'',
    __pending:true };

  if (!parentId) {
    roots[wf] = tempId;
  } else {
    const field = isYes ? 'nextYes' : 'nextNo';
    allDocs[parentId] = { ...allDocs[parentId], [field]: tempId };
    if (!isYes) allDocs[parentId].isDecision = true;
  }

  renderAll();

  // Replace the rendered pending box with a live textarea
  const col = document.getElementById('col-' + wf);
  if (!col) { cancelInline(wf, parentId, isYes); return; }

  // Find the wrap containing the pending box
  let targetWrap = null;
  col.querySelectorAll('.step-wrap').forEach(w => {
    const b = w.querySelector('.step-box');
    if (b?.getAttribute('onclick')?.includes('__pending__')) targetWrap = w;
  });
  if (!targetWrap) { cancelInline(wf, parentId, isYes); return; }

  const ta = document.createElement('textarea');
  ta.className = 'step-inline-input';
  ta.placeholder = 'Type task… Enter to save, Esc to cancel';
  ta.rows = 2;
  targetWrap.replaceWith(ta);
  ta.focus();

  let committed = false;

  ta.addEventListener('keydown', async e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (committed) return;
      committed = true;
      const task = ta.value.trim();
      if (!task) { cancelInline(wf, parentId, isYes); return; }
      await commitInline(task, wf, parentId, isYes);
    }
    if (e.key === 'Escape') {
      if (committed) return;
      committed = true;
      cancelInline(wf, parentId, isYes);
    }
  });

  ta.addEventListener('blur', () => {
    setTimeout(() => {
      if (committed) return;
      committed = true;
      const task = ta.value.trim();
      if (task) commitInline(task, wf, parentId, isYes);
      else cancelInline(wf, parentId, isYes);
    }, 180);
  });
};

async function commitInline(task, wf, parentId, isYes) {
  delete allDocs['__pending__'];
  try {
    setStatus('Saving...');
    const newData = {
      workflow:wf, step:'', task,
      url:'', audience:'', documents:'', deadline:'', notes:'',
      isDecision:false, nextYes:null, nextNo:null, rejoinId:'',
    };
    const ref = await addDoc(collection(db,'workflows'), newData);
    const newId = ref.id;

    if (!parentId) {
      await setDoc(doc(db,'meta',wf), { rootId: newId });
    } else {
      const field = isYes ? 'nextYes' : 'nextNo';
      const updates = { [field]: newId };
      if (!isYes) updates.isDecision = true;
      await updateDoc(doc(db,'workflows',parentId), updates);
    }
    setStatus('Saved · ' + new Date().toLocaleTimeString());
    await loadAll();
    window.selectStep(newId);
  } catch(e) {
    setStatus('Error: '+e.message);
    alert('Error saving: '+e.message);
    await loadAll();
  }
}

function cancelInline(wf, parentId, isYes) {
  delete allDocs['__pending__'];
  if (!parentId) {
    delete roots[wf];
  } else if (allDocs[parentId]) {
    const field = isYes ? 'nextYes' : 'nextNo';
    allDocs[parentId] = { ...allDocs[parentId], [field]: null };
    if (!isYes) allDocs[parentId].isDecision = false;
  }
  renderAll();
}

// ── Side panel ─────────────────────────────────
window.selectStep = function(id) {
  if (!allDocs[id] || allDocs[id].__pending) return;
  selectedId = id;
  renderAll();
  openPanel(id);
};

function openPanel(id) {
  const n = allDocs[id];
  document.getElementById('sidePanel').classList.add('open');
  document.getElementById('sideInner').innerHTML = `
    <div class="side-title">
      <span>Step detail</span>
      <button class="side-close" onclick="window.closePanel()">×</button>
    </div>
    <div class="sf sf-task">
      <label>Task</label>
      <textarea id="sf-task">${esc(n.task||'')}</textarea>
    </div>
    <div class="sf">
      <label>Step label</label>
      <input id="sf-step" value="${esc(n.step||'')}" placeholder="e.g. 1, 2a">
    </div>
    <div class="sf">
      <label>URL</label>
      <input id="sf-url" value="${esc(n.url||'')}" placeholder="https://...">
    </div>
    <div class="sf">
      <label>Audience</label>
      <input id="sf-audience" value="${esc(n.audience||'')}">
    </div>
    <div class="sf">
      <label>Documents</label>
      <input id="sf-documents" value="${esc(n.documents||'')}">
    </div>
    <div class="sf">
      <label>Deadline</label>
      <input id="sf-deadline" value="${esc(n.deadline||'')}">
    </div>
    <div class="sf">
      <label>Notes</label>
      <textarea id="sf-notes">${esc(n.notes||'')}</textarea>
    </div>
    <p class="side-hint">Blue outline on a box = it has detail saved.</p>
    <div class="side-btns">
      <button class="btn-del" onclick="window.deleteStep('${id}')">Delete</button>
      <button class="btn-save" onclick="window.saveDetail('${id}')">Save</button>
    </div>`;
}

window.closePanel = function() {
  document.getElementById('sidePanel').classList.remove('open');
  selectedId = null;
  renderAll();
};

window.saveDetail = async function(id) {
  const task = document.getElementById('sf-task').value.trim();
  if (!task) { alert('Task cannot be empty.'); return; }
  try {
    setStatus('Saving...');
    await updateDoc(doc(db,'workflows',id), {
      task,
      step:      document.getElementById('sf-step').value.trim(),
      url:       document.getElementById('sf-url').value.trim(),
      audience:  document.getElementById('sf-audience').value.trim(),
      documents: document.getElementById('sf-documents').value.trim(),
      deadline:  document.getElementById('sf-deadline').value.trim(),
      notes:     document.getElementById('sf-notes').value.trim(),
    });
    setStatus('Saved · '+new Date().toLocaleTimeString());
    await loadAll();
    openPanel(id);
  } catch(e) { setStatus('Error: '+e.message); alert('Error: '+e.message); }
};

window.deleteStep = async function(id) {
  if (!confirm(`Delete "${allDocs[id]?.task||'this step'}"?\n\nAny steps pointing to it will need re-linking.`)) return;
  try {
    await deleteDoc(doc(db,'workflows',id));
    window.closePanel();
    await loadAll();
  } catch(e) { alert('Error: '+e.message); }
};

// ── Links ──────────────────────────────────────
function renderLinks() {
  const list = document.getElementById('linksList');
  const entries = Object.entries(allLinks).sort((a,b)=>(a[1].name||'').localeCompare(b[1].name||''));
  if (!entries.length) { list.innerHTML='<span class="links-empty">No links yet</span>'; return; }
  list.innerHTML = entries.map(([id,l])=>`
    <div class="link-item">
      <a href="${esc(l.url||'#')}" target="_blank" rel="noopener">${esc(l.name||'Untitled')}</a>
      <button class="link-edit-btn" onclick="window.showLinkForm('${id}')">edit</button>
    </div>`).join('');
}

window.showLinkForm = function(id) {
  editingLinkId = id;
  document.getElementById('linkNameIn').value = id ? (allLinks[id]?.name||'') : '';
  document.getElementById('linkUrlIn').value  = id ? (allLinks[id]?.url||'')  : '';
  document.getElementById('linkDelBtn').style.display = id ? '' : 'none';
  document.getElementById('linkForm').classList.add('visible');
  document.getElementById('linkNameIn').focus();
};

window.hideLinkForm = function() {
  editingLinkId = null;
  document.getElementById('linkForm').classList.remove('visible');
};

window.saveLink = async function() {
  const name = document.getElementById('linkNameIn').value.trim();
  const url  = document.getElementById('linkUrlIn').value.trim();
  if (!name || !url) { alert('Both name and URL are required.'); return; }
  try {
    if (editingLinkId) {
      await updateDoc(doc(db,'links',editingLinkId), {name,url});
    } else {
      await addDoc(collection(db,'links'), {name,url});
    }
    window.hideLinkForm();
    const snap = await getDocs(collection(db,'links'));
    allLinks={}; snap.forEach(d=>{ allLinks[d.id]=d.data(); });
    renderLinks();
  } catch(e) { alert('Error: '+e.message); }
};

window.deleteLink = async function() {
  if (!editingLinkId) return;
  if (!confirm(`Delete "${allLinks[editingLinkId]?.name}"?`)) return;
  try {
    await deleteDoc(doc(db,'links',editingLinkId));
    window.hideLinkForm();
    const snap = await getDocs(collection(db,'links'));
    allLinks={}; snap.forEach(d=>{ allLinks[d.id]=d.data(); });
    renderLinks();
  } catch(e) { alert('Error: '+e.message); }
};

// ── Populate ───────────────────────────────────
document.getElementById('populateBtn').addEventListener('click', async () => {
  if (populateUsed) return;
  if (Object.keys(allDocs).length && !confirm('Database already has data. Add defaults on top?')) return;
  populateUsed = true;
  const btn = document.getElementById('populateBtn');
  btn.disabled=true; btn.textContent='Adding...';
  try {
    const {docs,rootIds} = buildDefaultData();
    const batch = writeBatch(db);
    for (const [id,data] of Object.entries(docs)) batch.set(doc(db,'workflows',id),data);
    for (const [wf,rid] of Object.entries(rootIds)) batch.set(doc(db,'meta',wf),{rootId:rid});
    await batch.commit();
    btn.style.display='none';
    await loadAll();
  } catch(e) {
    populateUsed=false; btn.disabled=false; btn.textContent='+ Populate Default Data';
    alert('Error: '+e.message);
  }
});

// ── Filter ─────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter=btn.dataset.filter;
    renderAll();
  });
});

// ── Boot ───────────────────────────────────────
loadAll();
</script>
</body>
</html>
